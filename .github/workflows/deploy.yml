name: Deploy to theblanc.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass

      - name: SSH diagnostic + get media files
        id: ssh_test
        env:
          SSHPASS: "Neverending48!"
        run: |
          echo "Testing SSH connectivity..."
          sshpass -e ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -p 22 theblanc@pdx1-shared-a2-06.dreamhost.com \
            "echo SSH_OK && ls ~/theblanc.io/media/ 2>/dev/null || echo NO_MEDIA_DIR" \
            > /tmp/ssh_out.txt 2>&1 || true

          cat /tmp/ssh_out.txt

          # Extract media files if connected
          MEDIA=$(grep -v "^debug\|^Warning\|^Authenticated\|^SSH_OK\|^OpenSSH" /tmp/ssh_out.txt | tr '\n' ',' | sed 's/,$//')
          echo "media_files=$MEDIA" >> $GITHUB_OUTPUT

          # Write diagnostic to repo for external reading
          cp /tmp/ssh_out.txt ssh-debug.log
          git config user.email "deploy@theblanc.io"
          git config user.name "Deploy Bot"
          git add ssh-debug.log
          git diff --cached --quiet || git commit -m "ci: ssh debug log"
          git push origin main || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy (preserve media)
        env:
          SSHPASS: "Neverending48!"
        run: |
          sshpass -e rsync -avz --delete --exclude='media/' \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p 22" \
            out/ theblanc@pdx1-shared-a2-06.dreamhost.com:~/theblanc.io/
          echo "Deploy complete"
