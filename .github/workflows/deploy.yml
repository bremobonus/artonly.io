name: Deploy to theblanc.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: List media files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: pdx1-shared-a2-06.dreamhost.com
          username: theblanc
          password: "Neverending48!"
          port: 22
          script: |
            echo "=== Media files on server ==="
            ls -la ~/theblanc.io/media/ 2>/dev/null || echo "No media dir found"
            echo "=== Web root ==="
            ls -la ~/theblanc.io/ 2>/dev/null || echo "No theblanc.io dir"

      - name: Build static export
        run: npm run build

      - name: Deploy files to DreamHost
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='media/'
          path: out/
          remote_path: ~/theblanc.io/
          remote_host: pdx1-shared-a2-06.dreamhost.com
          remote_port: 22
          remote_user: theblanc
          remote_password: "Neverending48!"
